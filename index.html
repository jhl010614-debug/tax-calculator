<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026 US Freelance Tax Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #result { margin-top: 25px; padding: 20px; background: #e8f6ef; border-radius: 6px; text-align: center; display: none; }
        .amount { font-size: 2em; color: #27ae60; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>2026 US Tax Calculator</h2>
    <div class="input-group">
        <label>Monthly Gross Income ($)</label>
        <input type="number" id="income" placeholder="e.g. 5000">
    </div>
    <div class="input-group">
        <label>Select Your State</label>
        <select id="stateSelect"></select>
    </div>
    <button onclick="calculateTax()">Calculate Savings</button>

    <div id="result">
        <p>You should set aside:</p>
        <div class="amount" id="savingsAmount">$0</div>
        <p><small>per month (Federal + State Taxes)</small></p>
    </div>
</div>

<script>
    // 미국 50개 주 세율 데이터 (2026 추정치)
    const states = [
        { name: "Alabama", rate: 5.0 }, { name: "Alaska", rate: 0.0 }, { name: "Arizona", rate: 2.5 },
        { name: "Arkansas", rate: 4.4 }, { name: "California", rate: 6.0 }, { name: "Colorado", rate: 4.4 },
        { name: "Connecticut", rate: 5.0 }, { name: "Delaware", rate: 5.5 }, { name: "Florida", rate: 0.0 },
        { name: "Georgia", rate: 5.4 }, { name: "Hawaii", rate: 7.0 }, { name: "Idaho", rate: 5.8 },
        { name: "Illinois", rate: 4.95 }, { name: "Indiana", rate: 3.0 }, { name: "Iowa", rate: 5.0 },
        { name: "Kansas", rate: 5.7 }, { name: "Kentucky", rate: 4.0 }, { name: "Louisiana", rate: 4.2 },
        { name: "Maine", rate: 7.1 }, { name: "Maryland", rate: 4.7 }, { name: "Massachusetts", rate: 5.0 },
        { name: "Michigan", rate: 4.25 }, { name: "Minnesota", rate: 6.8 }, { name: "Mississippi", rate: 4.0 },
        { name: "Missouri", rate: 4.8 }, { name: "Montana", rate: 5.9 }, { name: "Nebraska", rate: 5.8 },
        { name: "Nevada", rate: 0.0 }, { name: "New Hampshire", rate: 3.0 }, { name: "New Jersey", rate: 6.0 },
        { name: "New Mexico", rate: 4.9 }, { name: "New York", rate: 5.5 }, { name: "North Carolina", rate: 4.5 },
        { name: "North Dakota", rate: 2.5 }, { name: "Ohio", rate: 3.5 }, { name: "Oklahoma", rate: 4.75 },
        { name: "Oregon", rate: 8.0 }, { name: "Pennsylvania", rate: 3.07 }, { name: "Rhode Island", rate: 5.0 },
        { name: "South Carolina", rate: 6.0 }, { name: "South Dakota", rate: 0.0 }, { name: "Tennessee", rate: 0.0 },
        { name: "Texas", rate: 0.0 }, { name: "Utah", rate: 4.65 }, { name: "Vermont", rate: 6.0 },
        { name: "Virginia", rate: 5.0 }, { name: "Washington", rate: 0.0 }, { name: "West Virginia", rate: 6.0 },
        { name: "Wisconsin", rate: 5.3 }, { name: "Wyoming", rate: 0.0 }
    ];

    const select = document.getElementById('stateSelect');
    states.forEach(state => {
        let option = document.createElement('option');
        option.value = state.rate;
        option.text = `${state.name} (${state.rate}%)`;
        select.appendChild(option);
    });

    function calculateTax() {
        const income = parseFloat(document.getElementById('income').value);
        const stateTax = parseFloat(document.getElementById('stateSelect').value);
        const federalTax = 15.0; // 연방세 15% 가정
        
        if (isNaN(income)) { alert("Please enter your income."); return; }
        
        const totalRate = federalTax + stateTax;
        const savings = (income * (totalRate / 100)).toFixed(2);
        
        document.getElementById('savingsAmount').innerText = "$" + savings;
        document.getElementById('result').style.display = "block";
    }
</script>

</body>
</html>
